<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Milan Studio — Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="favicon.png" />
<style>
:root{
  --bg:#080807;--bg2:#0f0e0c;--bg3:#161410;--bg4:#1c1a16;
  --glass:rgba(255,255,255,0.03);--glass2:rgba(255,255,255,0.06);
  --gold:#c9a962;--gold2:#e2c98a;--gold3:#a8862e;
  --goldbg:rgba(201,169,98,0.1);--goldbrd:rgba(201,169,98,0.18);--goldbrd2:rgba(201,169,98,0.4);
  --text:#ede9e3;--text2:#b8b0a4;--text3:#756d62;
  --danger:#e05555;--dangerbg:rgba(224,85,85,0.12);--dangerbrd:rgba(224,85,85,0.3);
  --ok:#4caf7d;--okbg:rgba(76,175,125,0.12);--okbrd:rgba(76,175,125,0.3);
  --r:12px;--r2:8px;--sw:260px;
  --fd:"Cormorant Garamond",Georgia,serif;
  --fb:"Manrope",system-ui,sans-serif;
  --shadow:0 8px 32px rgba(0,0,0,0.5);
  --shadow2:0 24px 64px rgba(0,0,0,0.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--fb);font-size:14px;color:var(--text);background:var(--bg);min-height:100vh;overflow-x:hidden}

/* ── Noise texture ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4}

/* ── Layout ── */
.layout{display:flex;min-height:100vh;position:relative;z-index:1}

/* ── Sidebar ── */
.sb{
  width:var(--sw);background:var(--bg2);
  border-right:1px solid var(--goldbrd);
  display:flex;flex-direction:column;
  position:fixed;top:0;left:0;bottom:0;z-index:100;
  overflow-y:auto;transition:transform .3s cubic-bezier(.4,0,.2,1);
}
.sb-top{padding:1.75rem 1.5rem 1.25rem;border-bottom:1px solid var(--goldbrd)}
.sb-brand{display:flex;flex-direction:column;gap:2px}
.sb-milan{font-family:var(--fd);font-size:1.6rem;font-weight:600;color:var(--gold);letter-spacing:.05em;line-height:1}
.sb-studio{font-size:.58rem;letter-spacing:.35em;color:var(--text3);text-transform:uppercase}
.sb-nav{flex:1;padding:.75rem 0;display:flex;flex-direction:column;gap:2px}
.sb-sec{padding:.75rem 1.5rem .3rem;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text3)}
.sb-btn{
  display:flex;align-items:center;gap:.7rem;padding:.65rem 1.5rem;
  color:var(--text2);background:none;border:none;width:100%;text-align:left;
  cursor:pointer;font-family:var(--fb);font-size:.875rem;font-weight:400;
  border-left:2px solid transparent;transition:all .18s ease;
  border-radius:0;position:relative;
}
.sb-btn::after{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:2px;height:0;background:var(--gold);transition:height .2s ease;border-radius:1px}
.sb-btn:hover{color:var(--gold2);background:var(--goldbg)}
.sb-btn.active{color:var(--gold);background:var(--goldbg)}
.sb-btn.active::after{height:60%}
.sb-btn svg{flex-shrink:0;opacity:.6;transition:opacity .18s}
.sb-btn:hover svg,.sb-btn.active svg{opacity:1}
.sb-foot{padding:1rem 1.5rem;border-top:1px solid var(--goldbrd)}

/* ── Main ── */
.main{margin-left:var(--sw);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{
  height:60px;background:rgba(15,14,12,0.85);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--goldbrd);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 2rem;position:sticky;top:0;z-index:50;
}
.topbar-left{display:flex;align-items:center;gap:1rem}
.tb-title{font-family:var(--fd);font-size:1.15rem;color:var(--gold2);font-weight:500}
.tb-user{font-size:.75rem;color:var(--text3);display:flex;align-items:center;gap:.4rem}
.tb-dot{width:6px;height:6px;background:var(--ok);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.content{flex:1;padding:2rem;max-width:1100px}

/* ── Panels ── */
.panel{display:none;animation:fadeIn .25s ease}
.panel.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;gap:1rem;flex-wrap:wrap}
.ph-title{font-family:var(--fd);font-size:1.75rem;color:var(--gold2);font-weight:500}

/* ── Card ── */
.card{
  background:var(--glass);
  border:1px solid var(--goldbrd);
  border-radius:var(--r);
  overflow:hidden;
  backdrop-filter:blur(4px);
}
.card-header{padding:.75rem 1.25rem;background:rgba(201,169,98,0.04);border-bottom:1px solid var(--goldbrd);display:flex;align-items:center;gap:.5rem}
.card-header-title{font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text3)}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{
  padding:.65rem 1rem;text-align:left;
  font-size:.65rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text3);background:rgba(0,0,0,0.2);
  border-bottom:1px solid var(--goldbrd);font-weight:500;
}
.tbl td{padding:.8rem 1rem;border-bottom:1px solid rgba(201,169,98,0.05);vertical-align:middle;font-size:.875rem;transition:background .15s}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:rgba(201,169,98,0.04)}
.tbl-empty{text-align:center;padding:3.5rem 1rem;color:var(--text3)}
.tbl-loading{text-align:center;padding:3rem 1rem}

/* ── Price grid table ── */
.price-grid{width:100%;border-collapse:collapse}
.price-grid th{
  padding:.65rem .9rem;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;
  color:var(--text3);background:rgba(0,0,0,0.2);border-bottom:1px solid var(--goldbrd);
  text-align:center;font-weight:500;
}
.price-grid th:first-child{text-align:left}
.price-grid td{padding:.6rem .9rem;border-bottom:1px solid rgba(201,169,98,0.05);vertical-align:middle;font-size:.875rem}
.price-grid tr:last-child td{border-bottom:none}
.price-grid tbody tr:hover td{background:rgba(201,169,98,0.04)}
.price-cell{
  text-align:center;min-width:120px;
}
.price-val{
  display:inline-flex;align-items:center;justify-content:center;
  padding:.3rem .6rem;background:var(--goldbg);
  border:1px solid var(--goldbrd);border-radius:6px;
  color:var(--gold2);font-size:.8rem;font-weight:500;cursor:pointer;
  transition:all .18s;min-width:80px;
}
.price-val:hover{background:rgba(201,169,98,0.18);border-color:var(--goldbrd2)}
.price-empty{color:var(--text3);font-size:.8rem;text-align:center;cursor:pointer;opacity:.5;transition:opacity .15s}
.price-empty:hover{opacity:1}
.master-head{display:flex;flex-direction:column;align-items:center;gap:.35rem;padding:.25rem 0}
.master-ava{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid var(--goldbrd)}
.master-ava-ph{width:32px;height:32px;border-radius:50%;background:var(--goldbg);display:flex;align-items:center;justify-content:center;color:var(--gold);font-size:.8rem;font-weight:700;border:1px solid var(--goldbrd);flex-shrink:0}

/* ── Category tabs ── */
.cat-tabs{display:flex;gap:.4rem;flex-wrap:wrap;margin-bottom:1.25rem}
.cat-tab{
  padding:.4rem 1rem;border:1px solid var(--goldbrd);border-radius:99px;
  font-size:.8rem;color:var(--text2);cursor:pointer;background:none;
  font-family:var(--fb);transition:all .18s;
}
.cat-tab:hover{color:var(--gold2);border-color:var(--goldbrd2)}
.cat-tab.active{background:var(--goldbg);color:var(--gold);border-color:var(--gold)}

/* ── Badges ── */
.badge{display:inline-flex;align-items:center;padding:.2rem .55rem;border-radius:99px;font-size:.7rem;font-weight:600;letter-spacing:.04em}
.badge-top{background:rgba(201,169,98,0.15);color:var(--gold2);border:1px solid rgba(201,169,98,0.3)}
.badge-master{background:rgba(178,178,178,0.1);color:#ccc;border:1px solid rgba(178,178,178,0.2)}
.pos-num{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;background:var(--goldbg);border-radius:50%;font-size:.7rem;color:var(--gold);font-weight:700;border:1px solid var(--goldbrd)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:.4rem;padding:.55rem 1.1rem;border-radius:var(--r2);font-family:var(--fb);font-size:.825rem;font-weight:500;cursor:pointer;border:1px solid transparent;transition:all .18s;text-decoration:none;white-space:nowrap;line-height:1.4}
.btn:disabled{opacity:.5;cursor:not-allowed}
.btn-gold{background:linear-gradient(135deg,var(--gold) 0%,var(--gold3) 100%);color:#1a1511;border-color:transparent}
.btn-gold:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px);box-shadow:0 4px 16px rgba(201,169,98,0.3)}
.btn-ghost{background:var(--glass2);color:var(--text2);border-color:var(--goldbrd)}
.btn-ghost:hover:not(:disabled){color:var(--gold2);border-color:var(--goldbrd2);background:var(--goldbg)}
.btn-danger{background:var(--dangerbg);color:var(--danger);border-color:var(--dangerbrd)}
.btn-danger:hover:not(:disabled){background:rgba(224,85,85,0.2)}
.icon-btn{padding:.4rem;background:var(--glass);border:1px solid var(--goldbrd);color:var(--text2);border-radius:var(--r2);cursor:pointer;transition:all .18s;line-height:0;display:inline-flex}
.icon-btn:hover{color:var(--gold);border-color:var(--goldbrd2);background:var(--goldbg)}
.icon-btn.del:hover{color:var(--danger);border-color:var(--dangerbrd);background:var(--dangerbg)}
.acts{display:flex;gap:.3rem;align-items:center}

/* ── Forms ── */
.fg{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.9rem}
.fg label{font-size:.75rem;color:var(--text2);font-weight:500;letter-spacing:.03em}
.fg input,.fg textarea,.fg select{
  padding:.6rem .85rem;background:rgba(0,0,0,0.3);
  border:1px solid var(--goldbrd);border-radius:var(--r2);
  color:var(--text);font-family:var(--fb);font-size:.875rem;
  transition:border-color .18s,box-shadow .18s;width:100%;
}
.fg input:focus,.fg textarea:focus,.fg select:focus{
  outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,169,98,0.08)
}
.fg select option{background:var(--bg3)}
.fg small{font-size:.7rem;color:var(--text3)}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}

/* ── Modal ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;opacity:0;visibility:hidden;transition:opacity .22s,visibility .22s;backdrop-filter:blur(4px)}
.overlay.open{opacity:1;visibility:visible}
.modal{
  background:var(--bg3);border:1px solid var(--goldbrd);border-radius:16px;
  padding:2rem;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;
  transform:translateY(16px) scale(.98);transition:transform .22s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--shadow2);
}
.overlay.open .modal{transform:translateY(0) scale(1)}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;padding-bottom:1rem;border-bottom:1px solid var(--goldbrd)}
.modal-title{font-family:var(--fd);font-size:1.3rem;color:var(--gold2);font-weight:500}
.modal-foot{display:flex;gap:.5rem;justify-content:flex-end;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--goldbrd)}

/* ── Price edit modal ── */
.price-edit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.6rem;margin-top:.75rem}
.price-master-block{background:rgba(0,0,0,0.2);border:1px solid var(--goldbrd);border-radius:var(--r2);padding:.75rem}
.price-master-name{display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--text2);margin-bottom:.5rem;font-weight:500}

/* ── Toast ── */
#toasts{position:fixed;bottom:1.75rem;right:1.75rem;display:flex;flex-direction:column;gap:.5rem;z-index:9999;pointer-events:none}
.toast{
  padding:.75rem 1.1rem;border-radius:var(--r2);font-size:.825rem;
  min-width:220px;max-width:340px;pointer-events:auto;
  animation:toastIn .3s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--shadow);display:flex;align-items:center;gap:.5rem;
}
.toast.ok{background:var(--okbg);color:#7dd4a8;border:1px solid var(--okbrd)}
.toast.err{background:var(--dangerbg);color:#e88;border:1px solid var(--dangerbrd)}
@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* ── Spinner ── */
.spin{width:20px;height:20px;border:2px solid var(--goldbrd);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}

/* ── Avatar ── */
.ava{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid var(--goldbrd)}
.ava-ph{width:36px;height:36px;border-radius:50%;background:var(--goldbg);display:inline-flex;align-items:center;justify-content:center;color:var(--gold);font-size:.9rem;font-weight:700;border:1px solid var(--goldbrd)}

/* ── Drag handle ── */
.drag-handle{cursor:grab;color:var(--text3);transition:color .15s;padding:.2rem}
.drag-handle:hover{color:var(--gold2)}
tr.dragging{opacity:.5;background:var(--goldbg)!important}
tr.drag-over td{border-top:2px solid var(--gold)!important}

/* ── Schedule ── */
.schedule-row{display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:1rem;padding:.85rem 1.25rem;border-bottom:1px solid rgba(201,169,98,0.05)}
.schedule-row:last-child{border-bottom:none}
.schedule-day{font-size:.875rem;color:var(--text)}
.schedule-time{color:var(--gold);font-size:.875rem;font-weight:500;font-variant-numeric:tabular-nums}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(201,169,98,0.2);border-radius:99px}
::-webkit-scrollbar-thumb:hover{background:rgba(201,169,98,0.4)}

/* ── Mobile ── */
#burger{display:none}
@media(max-width:900px){
  .sb{transform:translateX(-100%)}
  .sb.open{transform:translateX(0)}
  .main{margin-left:0}
  .topbar,.content{padding-left:1rem;padding-right:1rem}
  #burger{display:flex;padding:.4rem;background:var(--glass);border:1px solid var(--goldbrd);color:var(--text2);border-radius:var(--r2);cursor:pointer;line-height:0}
  .fg2{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="layout">

<!-- ══ SIDEBAR ══════════════════════════════════════════════ -->
<aside class="sb" id="sb">
  <div class="sb-top">
    <a href="/" style="text-decoration:none" class="sb-brand">
      <span class="sb-milan">Milan</span>
      <span class="sb-studio">Beauty Studio</span>
    </a>
  </div>
  <nav class="sb-nav">
    <div class="sb-sec">Контент</div>
    <button class="sb-btn" data-p="categories">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span>Категорії</span>
    </button>
    <button class="sb-btn" data-p="masters">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      <span>Майстри</span>
    </button>
    <button class="sb-btn" data-p="services">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg>
      <span>Послуги</span>
    </button>
    <button class="sb-btn" data-p="prices">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 1 0 0 7h5a3.5 3.5 0 1 1 0 7H6"/></svg>
      <span>Прайс</span>
    </button>
    <button class="sb-btn" data-p="schedule">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="14" x2="8" y2="14" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="14" x2="12" y2="14" stroke-width="2" stroke-linecap="round"/><line x1="16" y1="14" x2="16" y2="14" stroke-width="2" stroke-linecap="round"/></svg>
      <span>Графік роботи</span>
    </button>
    <div class="sb-sec" style="margin-top:.5rem">Інструменти</div>
    <button class="sb-btn" id="export-btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      <span>Експорт JSON</span>
    </button>
  </nav>
  <div class="sb-foot">
    <button class="sb-btn" id="logout-btn" style="color:var(--danger)">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Вийти</span>
    </button>
  </div>
</aside>

<!-- ══ MAIN ══════════════════════════════════════════════════ -->
<div class="main">
  <div class="topbar">
    <div class="topbar-left">
      <button id="burger">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span class="tb-title" id="tb-title">Категорії</span>
    </div>
    <div class="tb-user">
      <span class="tb-dot"></span>
      <span id="tb-email"></span>
    </div>
  </div>

  <div class="content">

    <!-- CATEGORIES -->
    <div class="panel" id="p-categories">
      <div class="ph">
        <h2 class="ph-title">Категорії послуг</h2>
        <button class="btn btn-gold" onclick="P.cats.openForm()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Нова категорія
        </button>
      </div>
      <div class="card">
        <table class="tbl">
          <thead><tr><th style="width:44px"></th><th style="width:44px">#</th><th>Назва</th><th>Slug</th><th style="width:90px">Дії</th></tr></thead>
          <tbody id="tb-cats"></tbody>
        </table>
      </div>
    </div>

    <!-- MASTERS -->
    <div class="panel" id="p-masters">
      <div class="ph">
        <h2 class="ph-title">Майстри</h2>
        <button class="btn btn-gold" onclick="P.masters.openForm()">

<script>
'use strict';

// ── Supabase ────────────────────────────────────────────────
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ── Auth guard ──────────────────────────────────────────────
(async () => {
  const { data } = await sb.auth.getSession();
  if (!data.session) { location.href = 'login.html'; return; }
  document.getElementById('tb-email').textContent = data.session.user.email;
})();
document.getElementById('logout-btn').onclick = async () => {
  await sb.auth.signOut(); location.href = 'login.html';
};

// ── DB ──────────────────────────────────────────────────────
const DB = {
  async get(table, match = {}, order = ['position','id']) {
    let q = sb.from(table).select('*');
    Object.entries(match).forEach(([k,v]) => { q = q.eq(k, v); });
    order.forEach(o => { q = q.order(o); });
    const { data, error } = await q;
    if (error) throw new Error(error.message);
    return data || [];
  },
  async ins(table, row) {
    const { data, error } = await sb.from(table).insert(row).select().single();
    if (error) throw new Error(error.message);
    return data;
  },
  async upd(table, id, row) {
    const { error } = await sb.from(table).update(row).eq('id', id);
    if (error) throw new Error(error.message);
  },
  async del(table, id) {
    const { error } = await sb.from(table).delete().eq('id', id);
    if (error) throw new Error(error.message);
  },
  async upsertPrice(serviceId, masterId, label) {
    // Перевіряємо чи існує запис
    const { data } = await sb.from('prices')
      .select('id').eq('service_id', serviceId).eq('master_id', masterId).maybeSingle();
    if (data) {
      await sb.from('prices').update({ label }).eq('id', data.id);
    } else {
      await sb.from('prices').insert({ service_id: serviceId, master_id: masterId, label });
    }
  },
  async deletePrice(serviceId, masterId) {
    await sb.from('prices').delete()
      .eq('service_id', serviceId).eq('master_id', masterId);
  }
};

// ── Toast ───────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">${type==='ok'?'<polyline points="20 6 9 17 4 12"/>':'<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>'}</svg> ${msg}`;
  document.getElementById('toasts').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Modal ───────────────────────────────────────────────────
let _onSave = null;
function openModal(title, html, onSave) {
  document.getElementById('m-title').textContent = title;
  document.getElementById('m-body').innerHTML = html;
  _onSave = onSave;
  document.getElementById('overlay').classList.add('open');
  setTimeout(() => { document.querySelector('#m-body input,#m-body select')?.focus(); }, 120);
}
function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  _onSave = null;
}
async function saveModal() {
  if (!_onSave) return;
  const btn = document.getElementById('m-save');
  btn.disabled = true; btn.textContent = '...';
  try { await _onSave(); closeModal(); }
  catch(e) { toast(e.message || 'Помилка', 'err'); }
  finally { btn.disabled = false; btn.textContent = 'Зберегти'; }
}
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Helpers ─────────────────────────────────────────────────
const esc = s => s==null?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fv  = id => { const e=document.getElementById(id); if(!e)return null; const v=e.value.trim(); return v===''?null:v; };
const fn  = id => { const v=fv(id); return v===null?null:Number(v); };

function avatarEl(avatar, name, size=36) {
  if (avatar) return `<img src="/${esc(avatar)}" class="ava" style="width:${size}px;height:${size}px" onerror="this.style.display='none';this.nextSibling.style.display='inline-flex'"><span class="ava-ph" style="width:${size}px;height:${size}px;display:none">${esc(name[0])}</span>`;
  return `<span class="ava-ph" style="width:${size}px;height:${size}px">${esc(name[0])}</span>`;
}

const DEL_ICO  = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`;

// ── Drag & Drop for table rows ───────────────────────────────
function initDrag(tbody, onReorder) {
  let dragged = null;
  tbody.querySelectorAll('tr').forEach(row => {
    row.draggable = true;
    row.addEventListener('dragstart', () => { dragged = row; row.classList.add('dragging'); });
    row.addEventListener('dragend',   () => { dragged = null; row.classList.remove('dragging'); tbody.querySelectorAll('tr').forEach(r=>r.classList.remove('drag-over')); });
    row.addEventListener('dragover',  e => { e.preventDefault(); row.classList.add('drag-over'); });
    row.addEventListener('dragleave', () => row.classList.remove('drag-over'));
    row.addEventListener('drop', e => {
      e.preventDefault(); row.classList.remove('drag-over');
      if (dragged && dragged !== row) {
        const rows = [...tbody.querySelectorAll('tr')];
        const from = rows.indexOf(dragged), to = rows.indexOf(row);
        if (from < to) tbody.insertBefore(dragged, row.nextSibling);
        else tbody.insertBefore(dragged, row);
        onReorder([...tbody.querySelectorAll('tr')].map(r => Number(r.dataset.id)));
      }
    });
  });
}

// ── Category tabs ────────────────────────────────────────────
function renderCatTabs(containerId, cats, activeCatId, onSelect) {
  const el = document.getElementById(containerId);

  el.innerHTML = cats.map(c =>
    `<button class="cat-tab${c.id===activeCatId?' active':''}" data-cid="${c.id}">${esc(c.name)}</button>`
  ).join('');

    btn.addEventListener('click', () => {
      el.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      onSelect(Number(btn.dataset.cid));
    });
  });
}

    }

    // Header
    let html = `<div style="overflow-x:auto"><table class="price-grid"><thead><tr><th>Послуга</th>`;
    catMasters.forEach(m=>{
      html+=`<th><div class="master-head">
        ${m.avatar?`<img src="/${esc(m.avatar)}" class="master-ava" onerror="this.style.display='none'">`:`<div class="master-ava-ph">${esc(m.name[0])}</div>`}
        <span style="font-size:.72rem;color:var(--text2)">${esc(m.name)}</span>
        ${m.role==='Топ-майстер'?`<span class="badge badge-top" style="font-size:.6rem">Топ</span>`:''}
      </div></th>`;
    });
    html+=`</tr></thead><tbody>`;

    catSvcs.forEach(svc=>{
      html+=`<tr><td>${esc(svc.name)}</td>`;
      catMasters.forEach(m=>{
        const p = S.prices.find(pr=>pr.service_id===svc.id && pr.master_id===m.id);
        const val = p?.label || (p?.price_to ? `${p.price_from}–${p.price_to}` : p?.price_from ? `${p.price_from} ₴` : null);
        html+=`<td class="price-cell">
          <span class="${val?'price-val':'price-empty'}" 
            onclick="P.prices.editCell(${svc.id},${m.id},'${esc(val||'')}','${esc(svc.name)}','${esc(m.name)}')">
            ${val ? esc(val) : '+ додати'}
          </span>
        </td>`;
      });
      html+=`</tr>`;
    });

    html+=`</tbody></table></div>`;
    card.innerHTML=html;
  },
  editCell(svcId, masterId, currentVal, svcName, masterName){
    openModal(`Ціна: ${svcName}`,`
      <p style="font-size:.8rem;color:var(--text2);margin-bottom:1rem">Майстер: <strong style="color:var(--gold2)">${esc(masterName)}</strong></p>
      <div class="fg"><label>Ціна (текст)</label>
        <input id="f-price" value="${esc(currentVal)}" placeholder="500 ₴ або 500-600 ₴ або від 4800 ₴">
        <small>Залиште порожнім — ціна буде видалена</small>
      </div>
    `, async()=>{
      const val = fv('f-price');
      if (val) { await DB.upsertPrice(svcId, masterId, val); toast('Ціну збережено ✓'); }
      else { await DB.deletePrice(svcId, masterId); toast('Ціну видалено'); }
      S.prices = await DB.get('prices');
      this.render();
    });
    setTimeout(()=>{
      const inp=document.getElementById('f-price');
      if(inp){ inp.focus(); inp.select(); }
    },130);
  }
};

// ── SCHEDULE ────────────────────────────────────────────────
P.schedule = {
  async load(){
    S.sched = await DB.get('schedule');
    this.render();
  },
  render(){
    const card=document.getElementById('sched-card');
    if (!S.sched.length){ card.innerHTML=`<div class="tbl-empty">Немає записів</div>`; return; }
    card.innerHTML = S.sched.map(s=>`
      <div class="schedule-row">
        <span class="schedule-day">${esc(s.day_label)}</span>
        <span class="schedule-time">${(s.open_time||'').slice(0,5)}</span>
        <span style="color:var(--text3)">—</span>
        <span class="schedule-time">${(s.close_time||'').slice(0,5)}</span>
        <div class="acts">
          <button class="icon-btn" onclick="P.sched.edit(${s.id})">${EDIT_ICO}</button>
          <button class="icon-btn del" onclick="P.sched.del(${s.id})">${DEL_ICO}</button>
        </div>
      </div>`).join('');
  },
  openForm(s={}){
    const isEdit=!!s.id;
    openModal(isEdit?'Редагувати графік':'Новий рядок',`
      <div class="fg"><label>Дні *</label><input id="f-day" value="${esc(s.day_label||'')}" placeholder="Понеділок – П'ятниця"></div>
      <div class="fg2">
        <div class="fg"><label>Відкриття *</label><input id="f-open" type="time" value="${s.open_time||'08:00'}"></div>
        <div class="fg"><label>Закриття *</label><input id="f-close" type="time" value="${s.close_time||'20:00'}"></div>
      </div>
      <div class="fg"><label>Позиція</label><input id="f-pos" type="number" value="${s.position||0}" min="0"></div>
    `, async()=>{
      const row={day_label:fv('f-day'),open_time:fv('f-open'),close_time:fv('f-close'),position:fn('f-pos')};
      if (!row.day_label||!row.open_time||!row.close_time) throw new Error('Заповніть всі поля');
      if (isEdit) await DB.upd('schedule',s.id,row); else await DB.ins('schedule',row);
      toast(isEdit?'Збережено ✓':'Додано ✓');
      await this.load();
    });
  },
  edit(id){ this.openForm(S.sched.find(r=>r.id===id)||{}); },
  async del(id){
    if (!confirm('Видалити цей рядок?')) return;
    await DB.del('schedule',id); toast('Видалено'); await this.load();
  }
};
P.sched = P.schedule;

// ── Export ───────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', async()=>{
  toast('Завантаження...');
  const [categories, masters, services, prices, schedule] = await Promise.all([
    DB.get('categories'), DB.get('masters'), DB.get('services'),
    DB.get('prices'), DB.get('schedule'),
  ]);
  const json = JSON.stringify({ exported_at:new Date().toISOString(), categories, masters, services, prices, schedule }, null, 2);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([json],{type:'application/json'}));
  a.download = `milan_data_${new Date().toISOString().slice(0,10)}.json`;
  a.click(); toast('JSON завантажено ✓');
});

// ── Init ─────────────────────────────────────────────────────
showPanel('categories');
</script>
</body>
</html>
