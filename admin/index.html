<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milan Studio — Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Manrope:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
      :root {
        --bg: #080807;
        --bg2: #0f0e0c;
        --bg3: #161410;
        --bg4: #1c1a16;
        --gold: #c9a962;
        --gold2: #e2c98a;
        --gold3: #a8862e;
        --gb: rgba(201, 169, 98, 0.1);
        --gbd: rgba(201, 169, 98, 0.18);
        --gbd2: rgba(201, 169, 98, 0.4);
        --text: #ede9e3;
        --t2: #b8b0a4;
        --t3: #756d62;
        --red: #e05555;
        --redbg: rgba(224, 85, 85, 0.12);
        --redbrd: rgba(224, 85, 85, 0.3);
        --okbg: rgba(76, 175, 125, 0.12);
        --okbrd: rgba(76, 175, 125, 0.3);
        --r: 12px;
        --r2: 8px;
        --fd: "Cormorant Garamond", Georgia, serif;
        --fb: "Manrope", system-ui, sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--fb);
        font-size: 14px;
        color: var(--text);
        background: var(--bg);
        min-height: 100vh;
      }

      body::before {
        content: "";
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;

        /* Ваш код переносимо сюди */
        background: url("background.jpg") no-repeat center center / cover;

        /* Регулюємо прозорість тут */
        opacity: 0.4;

        /* Кладемо під контент */
        z-index: -1;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      /* Header */
      .hdr {
        position: sticky;
        top: 0;
        z-index: 100;
        height: 62px;
        background: rgba(8, 8, 7, 0.93);
        backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--gbd);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1.75rem;
        gap: 1rem;
      }
      .hdr-brand {
        display: flex;
        flex-direction: column;
        line-height: 1;
        gap: 0.18rem;
      }
      .hdr-milan {
        font-family: var(--fd);
        font-size: 1.65rem;
        font-weight: 500;
        color: var(--gold);
        letter-spacing: 0.04em;
        line-height: 1;
      }
      .hdr-studio {
        font-size: 0.52rem;
        letter-spacing: 0.32em;
        text-transform: uppercase;
        color: var(--t3);
        font-weight: 400;
        padding-left: 1.1em;
      }

      .hdr-email {
        font-size: 0.75rem;
        color: var(--t3);
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      .dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #4caf7d;
        animation: blink 2s infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
      .nav-links {
        display: flex;
        gap: 0.25rem;
      }
      .nav-link {
        padding: 0.35rem 0.75rem;
        border-radius: var(--r2);
        font-size: 0.8rem;
        color: var(--t3);
        cursor: pointer;
        background: none;
        border: none;
        font-family: var(--fb);
        transition: all 0.15s;
      }
      .nav-link:hover {
        color: var(--gold2);
        background: var(--gb);
      }
      .nav-link.active {
        color: var(--gold);
        background: var(--gb);
      }

      /* Pages */
      .page {
        display: none;
        animation: fi 0.22s ease;
      }
      .page.active {
        display: block;
      }
      @keyframes fi {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .wrap {
        max-width: 1080px;
        margin: 0 auto;
        padding: 1.75rem;
      }

      /* Breadcrumb */
      .bc {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.8rem;
        color: var(--t3);
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
      }
      .bc-lnk {
        color: var(--gold);
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .bc-lnk:hover {
        opacity: 0.7;
      }
      .bc-sep {
        opacity: 0.35;
      }

      /* Page title */
      .ptitle {
        font-family: var(--fd);
        font-size: 1.65rem;
        color: var(--gold2);
        font-weight: 500;
      }

      /* Category cards grid */
      .cat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
        gap: 1rem;
      }
      .cat-card {
        background: var(--bg3);
        border: 1px solid var(--gbd);
        border-radius: var(--r);
        padding: 1.35rem 1.2rem;
        cursor: pointer;
        transition: all 0.2s;
        position: relative;
        overflow: hidden;
      }
      .cat-card::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(201, 169, 98, 0.04),
          transparent
        );
        opacity: 0;
        transition: opacity 0.2s;
      }
      .cat-card:hover {
        border-color: var(--gold);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
      }
      .cat-card:hover::before {
        opacity: 1;
      }
      .cat-card-acts {
        position: absolute;
        top: 0.7rem;
        right: 0.7rem;
        display: flex;
        gap: 0.25rem;
        opacity: 0;
        transition: opacity 0.15s;
        z-index: 2;
      }
      .cat-card:hover .cat-card-acts {
        opacity: 1;
      }
      .cat-name {
        font-family: var(--fd);
        font-size: 1.15rem;
        color: var(--gold2);
        margin-bottom: 0.4rem;
      }
      .cat-meta {
        font-size: 0.72rem;
        color: var(--t3);
        display: flex;
        gap: 0.6rem;
        flex-wrap: wrap;
      }
      .cat-meta span {
        display: flex;
        align-items: center;
        gap: 0.2rem;
      }
      .cat-add {
        background: none;
        border: 1.5px dashed rgba(201, 169, 98, 0.22);
        border-radius: var(--r);
        padding: 1.35rem 1.2rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        color: var(--t3);
        font-family: var(--fb);
        font-size: 0.85rem;
        transition: all 0.2s;
        width: 100%;
      }
      .cat-add:hover {
        border-color: var(--gold);
        color: var(--gold2);
      }

      /* Category detail layout */
      .cat-detail {
        display: grid;
        grid-template-columns: 1fr 280px;
        gap: 1.25rem;
        align-items: start;
      }
      @media (max-width: 860px) {
        .cat-detail {
          grid-template-columns: 1fr;
        }
      }

      /* Block */
      .blk {
        background: var(--bg3);
        border: 1px solid var(--gbd);
        border-radius: var(--r);
        overflow: hidden;
        margin-bottom: 1.25rem;
      }
      .blk-hdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.8rem 1.1rem;
        border-bottom: 1px solid var(--gbd);
        background: rgba(0, 0, 0, 0.15);
        gap: 0.5rem;
      }
      .blk-title {
        font-size: 0.65rem;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--t3);
        font-weight: 600;
      }
      .blk-body {
        padding: 0.35rem 0;
      }

      /* Service rows */
      .svc-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-bottom: 1px solid rgba(201, 169, 98, 0.04);
        transition: background 0.15s;
        cursor: default;
      }
      .svc-row:last-child {
        border-bottom: none;
      }
      .svc-row:hover {
        background: rgba(201, 169, 98, 0.04);
      }
      .svc-row.is-hdr {
        background: rgba(201, 169, 98, 0.05);
      }
      .svc-row.is-hdr {
        background: rgba(201, 169, 98, 0.07);
        border-left: 2px solid var(--gold);
      }
      .svc-row.is-hdr .svc-lbl {
        font-size: 0.72rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 700;
      }
      .svc-row.is-hdr::before {
        content: "§";
        color: var(--gold);
        opacity: 0.5;
        font-size: 0.8rem;
        margin-right: 0.3rem;
        flex-shrink: 0;
      }
      .svc-lbl {
        flex: 1;
        font-size: 0.875rem;
        color: var(--text);
      }
      .svc-drag {
        color: var(--t3);
        cursor: grab;
        line-height: 0;
        flex-shrink: 0;
        padding: 0.1rem;
        transition: color 0.15s;
      }
      .svc-drag:hover {
        color: var(--gold2);
      }
      .row-acts {
        display: flex;
        gap: 0.25rem;
        flex-shrink: 0;
      }
      .svc-empty {
        padding: 1.5rem;
        text-align: center;
        color: var(--t3);
        font-size: 0.8rem;
      }

      /* Master rows */
      .master-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.65rem 1.1rem;
        border-bottom: 1px solid rgba(201, 169, 98, 0.04);
        transition: background 0.15s;
      }
      .master-row:last-child {
        border-bottom: none;
      }
      .master-row:hover {
        background: rgba(201, 169, 98, 0.04);
      }
      .mava {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid var(--gbd);
        flex-shrink: 0;
      }
      .mava-ph {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--gb);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--gold);
        font-size: 0.85rem;
        font-weight: 700;
        border: 1px solid var(--gbd);
        flex-shrink: 0;
      }
      .master-info {
        flex: 1;
        min-width: 0;
      }
      .master-name {
        font-size: 0.875rem;
        font-weight: 500;
      }
      .master-role {
        font-size: 0.72rem;
        color: var(--t3);
      }
      .badge-top {
        display: inline-block;
        background: var(--gb);
        color: var(--gold2);
        border: 1px solid var(--gbd);
        border-radius: 99px;
        font-size: 0.62rem;
        padding: 0.1rem 0.4rem;
        font-weight: 600;
        margin-left: 0.3rem;
        vertical-align: middle;
      }

      /* Price table */
      .ptbl-wrap {
        overflow-x: auto;
        width: 100%;
      }
      .ptbl {
        width: 100%;
        border-collapse: collapse;
      }
      .ptbl th {
        padding: 0.65rem 0.9rem;
        font-size: 0.65rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--t3);
        background: rgba(0, 0, 0, 0.2);
        border-bottom: 1px solid var(--gbd);
        text-align: center;
        font-weight: 500;
        white-space: nowrap;
      }
      .ptbl th:first-child {
        text-align: left;
        min-width: 220px;
        width: 100%;
      }
      .ptbl td {
        padding: 0.6rem 0.9rem;
        border-bottom: 1px solid rgba(201, 169, 98, 0.05);
        vertical-align: middle;
        font-size: 0.85rem;
      }
      .ptbl tr:last-child td {
        border-bottom: none;
      }
      .ptbl tbody tr:hover td {
        background: rgba(201, 169, 98, 0.03);
      }
      .ptbl td:not(:first-child) {
        text-align: center;
      }
      .ptbl .hdr-row td {
        background: rgba(201, 169, 98, 0.08);
        padding: 0.45rem 0.9rem;
        border-left: 2px solid var(--gold);
      }
      .ptbl .hdr-row td span {
        font-size: 0.68rem;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--gold);
        font-weight: 700;
      }
      /* Підказка що це заголовок */
      .ptbl .hdr-row td::before {
        content: "▸ ";
        color: var(--gold);
        opacity: 0.6;
      }
      .pval {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0.3rem 0.65rem;
        background: var(--gb);
        border: 1px solid var(--gbd);
        border-radius: 6px;
        color: var(--gold2);
        font-size: 0.78rem;
        font-weight: 500;
        cursor: pointer;
        min-width: 78px;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .pval:hover {
        background: rgba(201, 169, 98, 0.18);
        border-color: var(--gbd2);
      }
      .padd {
        color: var(--t3);
        font-size: 0.75rem;
        cursor: pointer;
        transition: all 0.15s;
        display: inline-block;
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        opacity: 0.6;
      }
      .padd:hover {
        opacity: 1;
        color: var(--gold2);
        background: var(--gb);
      }
      .mhead {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.25rem;
        padding: 0.2rem 0.3rem;
        min-width: 70px;
        max-width: 100px;
      }
      .mhead-img {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid var(--gbd);
      }
      .mhead-ph {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        background: var(--gb);
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--gold);
        font-size: 0.7rem;
        font-weight: 700;
        border: 1px solid var(--gbd);
      }
      .mhead-nm {
        font-size: 0.68rem;
        color: var(--t2);
        text-align: center;
      }
      .mhead-role {
        font-size: 0.6rem;
        color: var(--gold);
        text-align: center;
      }

      /* Schedule rows */
      .sched-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0.85rem 1.25rem;
        border-bottom: 1px solid rgba(201, 169, 98, 0.05);
        gap: 0.75rem;
        flex-wrap: wrap;
      }
      .sched-row:last-child {
        border-bottom: none;
      }
      .sched-day {
        font-size: 0.875rem;
        flex: 1;
      }
      .sched-time {
        color: var(--gold);
        font-weight: 500;
        font-size: 0.875rem;
        white-space: nowrap;
      }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        padding: 0.5rem 1rem;
        border-radius: var(--r2);
        font-family: var(--fb);
        font-size: 0.82rem;
        font-weight: 500;
        cursor: pointer;
        border: 1px solid transparent;
        transition: all 0.18s;
        white-space: nowrap;
        line-height: 1.4;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-g {
        background: linear-gradient(135deg, var(--gold), var(--gold3));
        color: #1a1511;
      }
      .btn-g:hover:not(:disabled) {
        filter: brightness(1.1);
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(201, 169, 98, 0.25);
      }
      .btn-o {
        background: var(--bg4);
        color: var(--t2);
        border-color: var(--gbd);
      }
      .btn-o:hover:not(:disabled) {
        color: var(--gold2);
        border-color: var(--gbd2);
        background: var(--gb);
      }
      .btn-sm {
        padding: 0.35rem 0.75rem;
        font-size: 0.78rem;
      }
      .ib {
        padding: 0.35rem;
        background: none;
        border: 1px solid var(--gbd);
        color: var(--t3);
        border-radius: var(--r2);
        cursor: pointer;
        line-height: 0;
        transition: all 0.15s;
        display: inline-flex;
        align-items: center;
      }
      .ib:hover {
        color: var(--gold2);
        border-color: var(--gbd2);
        background: var(--gb);
      }
      .ib.r:hover {
        color: var(--red);
        border-color: var(--redbrd);
        background: var(--redbg);
      }

      /* Modal */
      .ov {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.78);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
        opacity: 0;
        visibility: hidden;
        transition:
          opacity 0.2s,
          visibility 0.2s;
        backdrop-filter: blur(5px);
      }
      .ov.open {
        opacity: 1;
        visibility: visible;
      }
      .mdl {
        background: var(--bg3);
        border: 1px solid var(--gbd);
        border-radius: 16px;
        padding: 1.75rem;
        width: 100%;
        max-width: 460px;
        max-height: 92vh;
        overflow-y: auto;
        transform: translateY(14px) scale(0.97);
        transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.65);
      }
      .ov.open .mdl {
        transform: none;
      }
      .mhdr {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.4rem;
        padding-bottom: 0.9rem;
        border-bottom: 1px solid var(--gbd);
      }
      .mtitle {
        font-family: var(--fd);
        font-size: 1.25rem;
        color: var(--gold2);
      }
      .mfoot {
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
        margin-top: 1.25rem;
        padding-top: 0.9rem;
        border-top: 1px solid var(--gbd);
      }

      /* Forms */
      .fg {
        display: flex;
        flex-direction: column;
        gap: 0.32rem;
        margin-bottom: 0.85rem;
      }
      .fg label {
        font-size: 0.75rem;
        color: var(--t2);
        font-weight: 500;
      }
      .fg input,
      .fg textarea,
      .fg select {
        padding: 0.6rem 0.85rem;
        background: rgba(0, 0, 0, 0.3);
        border: 1px solid var(--gbd);
        border-radius: var(--r2);
        color: var(--text);
        font-family: var(--fb);
        font-size: 0.875rem;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
        width: 100%;
      }
      .fg input:focus,
      .fg textarea:focus,
      .fg select:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(201, 169, 98, 0.08);
      }
      .fg select option {
        background: var(--bg3);
      }
      .fg small {
        font-size: 0.7rem;
        color: var(--t3);
      }
      .fg2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
      }

      /* Toast */
      #tst {
        position: fixed;
        bottom: 1.5rem;
        right: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 0.4rem;
        z-index: 999;
        pointer-events: none;
      }
      .t {
        padding: 0.7rem 1rem;
        border-radius: var(--r2);
        font-size: 0.82rem;
        pointer-events: auto;
        animation: tin 0.22s ease;
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        display: flex;
        align-items: center;
        gap: 0.45rem;
        min-width: 190px;
      }
      .t.ok {
        background: var(--okbg);
        color: #7dd4a8;
        border: 1px solid var(--okbrd);
      }
      .t.er {
        background: var(--redbg);
        color: #e88;
        border: 1px solid var(--redbrd);
      }
      @keyframes tin {
        from {
          opacity: 0;
          transform: translateX(14px);
        }
        to {
          opacity: 1;
          transform: translateX(0);
        }
      }

      /* Spinner */
      .sp {
        width: 18px;
        height: 18px;
        border: 2px solid var(--gbd);
        border-top-color: var(--gold);
        border-radius: 50%;
        animation: spr 0.7s linear infinite;
        display: inline-block;
        flex-shrink: 0;
      }
      @keyframes spr {
        to {
          transform: rotate(360deg);
        }
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 2.5rem;
        color: var(--t3);
      }

      /* Drag */
      .dragging {
        opacity: 0.35;
      }
      .dragover-top {
        border-top: 2px solid var(--gold) !important;
      }

      /* Logout */
      .logout-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-family: var(--fb);
        font-size: 0.78rem;
        color: var(--red);
        display: flex;
        align-items: center;
        gap: 0.3rem;
        padding: 0.3rem 0.6rem;
        border-radius: var(--r2);
        transition: background 0.15s;
      }
      .logout-btn:hover {
        background: var(--redbg);
      }

      /* Cat card icon */

    <!-- ═══ PAGE: CATEGORIES HOME ═══════════════════════════════ -->

    <!-- MODAL -->
    <div class="ov" id="ov">

              width="14"

    <div id="tst"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <script>
      "use strict";

      // ── Supabase ────────────────────────────────────────────────
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      window._adminSb = sb; // доступний для допоміжних функцій

      // ── SVG іконки за замовчуванням ─────────────────────────────
      const DEFAULT_SVG_ICONS = {
        hair1: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><path d="M5 16L3 5L8.5 10L12 4L15.5 10L21 5L19 16H5Z"/><path d="M5 19H19" stroke-width="1.5"/></svg>`,
        hair2: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><circle cx="6" cy="7" r="3"/><circle cx="6" cy="17" r="3"/><path d="M20 4L8.12 15.88"/><path d="M14.47 14.48L20 20"/></svg>`,
        permanent: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><path d="M4 12c0-3.5 4-6 8-6s8 2.5 8 6-4 6-8 6-8-2.5-8-6z"/><path d="M14 13l4 6" stroke-width="1.4"/></svg>`,
        nails: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><path d="M7 14v4a3 3 0 0 0 3 3h1a3 3 0 0 0 3-3v-4"/><path d="M7 14c0-2 1-3 3-3s3 1 3 3"/></svg>`,
        brows: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><path d="M4 14c3-4 8-6 16-2"/><path d="M4 15c3-4 8-6 16-2" opacity="0.5"/></svg>`,
        massage: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><circle cx="6" cy="7" r="2.5"/><path d="M4 18c0-2 2-3 5-3s5 1 5 3v2H4v-2z"/></svg>`,
        // Стара назва для сумісності
        hair: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><path d="M5 16L3 5L8.5 10L12 4L15.5 10L21 5L19 16H5Z"/><path d="M5 19H19" stroke-width="1.5"/></svg>`,
        colorist: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="width:22px;height:22px"><circle cx="6" cy="7" r="3"/><circle cx="6" cy="17" r="3"/><path d="M20 4L8.12 15.88"/></svg>`,
      };

      // Рендерить превью іконки
      function renderCatIconPreview(cat) {
        if (!cat || !cat.icon)
          return (
            DEFAULT_SVG_ICONS[cat?.slug] || DEFAULT_SVG_ICONS.massage || ""
          );
        const t = (cat.icon || "").trim();
        if (t.startsWith("<")) return t;
        const url = t.startsWith("http")
          ? t
          : `${SUPABASE_URL}/storage/v1/object/public/icons/${t}`;
        return `<img src="${url}" style="width:22px;height:22px;object-fit:contain" alt="">`;
      }

      // Превью при виборі файлу
      function previewIconFile(input) {
        const file = input.files[0];
        if (!file) return;
        const preview = document.getElementById("icon-preview");
        if (!preview) return;
        if (file.type === "image/svg+xml") {
          const r = new FileReader();
          r.onload = (e) => {
            // Додаємо gold колір до SVG
            let svg = e.target.result;
            if (!svg.includes("stroke=") && !svg.includes("fill=")) {
              svg = svg.replace(
                "<svg",
                '<svg stroke="currentColor" fill="none"',
              );
            }
            preview.style.color = "var(--gold)";
            preview.innerHTML = svg;
            // Встановлюємо розмір SVG
            const svgEl = preview.querySelector("svg");
            if (svgEl) {
              svgEl.style.width = "28px";
              svgEl.style.height = "28px";
            }
            // Також заповнюємо textarea
            document.getElementById("f-icon-text").value = e.target.result;
          };
          r.readAsText(file);
        } else {
          const r = new FileReader();
          r.onload = (e) => {
            preview.innerHTML = `<img src="${e.target.result}" style="width:32px;height:32px;object-fit:contain">`;
          };
          r.readAsDataURL(file);
        }
      }

      // Завантаження іконки у Storage bucket "icons"
      async function uploadIconFile(file, slug) {
        const ext = file.name.split(".").pop().toLowerCase();
        const path = `${slug}_${Date.now()}.${ext}`;
        const { error } = await sb.storage.from("icons").upload(path, file, {
          contentType: file.type,
          upsert: true,
        });
        if (error) throw new Error("Помилка завантаження: " + error.message);
        return path;
      }

      // ── Auth ────────────────────────────────────────────────────
      (async () => {
        const { data } = await sb.auth.getSession();
        if (!data.session) {
          location.href = "login.html";
          return;
        }
        document.getElementById("u-email").textContent =
          data.session.user.email;
      })();
      document.getElementById("logout-btn").onclick = async () => {
        await sb.auth.signOut();
        location.href = "login.html";
      };

      // ── DB helpers ──────────────────────────────────────────────
      const DB = {
        async all(table, match = {}) {
          // Таблиця prices не має колонки position — сортуємо лише по id
          const hasPosition = !["prices"].includes(table);
          let q = sb.from(table).select("*");
          if (hasPosition) {
            q = q.order("position", { ascending: true, nullsFirst: false });
          }
          q = q.order("id", { ascending: true });
          for (const [k, v] of Object.entries(match)) q = q.eq(k, v);
          const { data, error } = await q;
          if (error) {
            console.error(`[DB.all] ${table}:`, error);
            throw new Error(`${table}: ${error.message}`);
          }
          return data || [];
        },
        async ins(table, row) {
          const { data, error } = await sb
            .from(table)
            .insert(row)
            .select()
            .single();
          if (error) throw new Error(error.message);
          return data;
        },
        async upd(table, id, row) {
          const { error } = await sb.from(table).update(row).eq("id", id);
          if (error) throw new Error(error.message);
        },
        async del(table, id) {
          const { error } = await sb.from(table).delete().eq("id", id);
          if (error) throw new Error(error.message);
        },
        async upsertPrice(sid, mid, label) {
          const { data } = await sb
            .from("prices")
            .select("id")
            .eq("service_id", sid)
            .eq("master_id", mid)
            .maybeSingle();
          if (data)
            await sb
              .from("prices")
              .update({ label, price_from: null, price_to: null })
              .eq("id", data.id);
          else
            await sb
              .from("prices")
              .insert({ service_id: sid, master_id: mid, label });
        },
        async delPrice(sid, mid) {
          await sb
            .from("prices")
            .delete()
            .eq("service_id", sid)
            .eq("master_id", mid);
        },
      };

      // ── State ───────────────────────────────────────────────────
      let S = { cats: [], masters: [], svcs: [], prices: [], sched: [] };
      let activeCatId = null;

      // ── Toast ───────────────────────────────────────────────────
      function toast(msg, type = "ok") {
        const el = document.createElement("div");
        el.className = `t ${type}`;
        el.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">${type === "ok" ? '<polyline points="20 6 9 17 4 12"/>' : '<circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>'}</svg> ${msg}`;
        document.getElementById("tst").appendChild(el);
        setTimeout(() => el.remove(), 3200);
      }

      // ── Modal ───────────────────────────────────────────────────
      let _save = null;
      function modal(title, html, onSave) {
        document.getElementById("m-title").textContent = title;
        document.getElementById("m-body").innerHTML = html;
        _save = onSave;
        document.getElementById("ov").classList.add("open");
        setTimeout(
          () =>
            document.querySelector("#m-body input, #m-body select")?.focus(),
          110,
        );
      }
      function closeModal() {
        document.getElementById("ov").classList.remove("open");
        _save = null;
        _pendingAvatarFile = null;
      }
      async function doSave() {
        if (!_save) return;
        const btn = document.getElementById("m-ok");
        btn.disabled = true;
        btn.textContent = "...";
        try {
          await _save();
          closeModal();
        } catch (e) {
          toast(e.message || "Помилка", "er");
        } finally {
          btn.disabled = false;
          btn.textContent = "Зберегти";
        }
      }
      document.getElementById("ov").addEventListener("click", (e) => {
        if (e.target.id === "ov") closeModal();
      });
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") closeModal();
      });

      // ── Helpers ─────────────────────────────────────────────────
      const esc = (s) =>
        s == null
          ? ""
          : String(s)
              .replace(/&/g, "&amp;")
              .replace(/</g, "&lt;")
              .replace(/>/g, "&gt;")
              .replace(/"/g, "&quot;");
      const fv = (id) => {
        const e = document.getElementById(id);
        if (!e) return null;
        const v = e.value.trim();
        return v === "" ? null : v;
      };
      const fn = (id) => {
        const v = fv(id);
        return v === null ? null : Number(v);
      };

      const EDIT_ICO = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`;
      const DEL_ICO = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>`;

      // ── Avatar URL helper ────────────────────────────────────
      function resolveAvatarUrl(avatar) {
        if (!avatar) return null;
        if (avatar.startsWith("http")) return avatar;
        if (!avatar.startsWith("images/")) {
          return `${SUPABASE_URL}/storage/v1/object/public/avatars/${avatar}`;
        }
        return `/${avatar}`;
      }

      function avaEl(avatar, name, size = 34) {
        const src = resolveAvatarUrl(avatar);
        const initials = esc((name || "?")[0]);
        return src
          ? `<img src="${esc(src)}" class="mava" style="width:${size}px;height:${size}px" onerror="this.style.display='none';this.nextSibling.style.display='inline-flex'"><span class="mava-ph" style="width:${size}px;height:${size}px;display:none">${initials}</span>`
          : `<span class="mava-ph" style="width:${size}px;height:${size}px">${initials}</span>`;
      }

      // ── Avatar upload to Supabase Storage ────────────────────
      let _pendingAvatarFile = null;

      function previewAvatar(input) {
        const file = input.files[0];
        if (!file) return;
        _pendingAvatarFile = file;
        document.getElementById("ava-filename").textContent = file.name;
        const reader = new FileReader();
        reader.onload = (e) => {
          const wrap = document.getElementById("ava-preview-wrap");
          const img = document.getElementById("ava-preview");
          img.src = e.target.result;
          img.style.display = "block";
          wrap.style.display = "block";
        };
        reader.readAsDataURL(file);
      }

      async function uploadPendingAvatar() {
        if (!_pendingAvatarFile) return null;
        const file = _pendingAvatarFile;
        const ext = file.name.split(".").pop();
        const path = `masters/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const { error } = await sb.storage
          .from("avatars")
          .upload(path, file, { upsert: true });
        if (error)
          throw new Error("Помилка завантаження фото: " + error.message);
        _pendingAvatarFile = null;
        return path;
      }

      // ── Navigation ───────────────────────────────────────────────
      function setPage(id) {
        document
          .querySelectorAll(".page")
          .forEach((p) => p.classList.remove("active"));
        document.getElementById(id).classList.add("active");
        window.scrollTo(0, 0);
      }
      function setNav(id) {
        document
          .querySelectorAll(".nav-link")
          .forEach((n) => n.classList.remove("active"));
        document.getElementById(id)?.classList.add("active");
      }

      function goCats() {
        setNav("nav-cats");
        setPage("pg-home");
        loadHome();
      }
      function goMasters() {
        setNav("nav-masters");
        setPage("pg-masters");
        loadAllMasters();
      }
      function goSched() {
        setNav("nav-sched");
        setPage("pg-sched");
        loadSched();
      }

      // ══════════════════════════════════════════════════════════════
      // HOME — категорії
      // ══════════════════════════════════════════════════════════════
      async function loadHome() {
        const grid = document.getElementById("cat-grid");
        grid.innerHTML = `<div class="loading" style="grid-column:1/-1"><div class="sp"></div></div>`;

        [S.cats, S.masters, S.svcs] = await Promise.all([
          DB.all("categories"),
          DB.all("masters"),
          DB.all("services"),
        ]);

        grid.innerHTML =
          S.cats
            .map((c) => {
              const mCnt = S.masters.filter(
                (m) => m.category_id === c.id,
              ).length;
              const sCnt = S.svcs.filter((s) => s.category_id === c.id).length;
              return `
    <div class="cat-card" onclick="openCat(${c.id})">
      <div class="cat-card-acts" onclick="event.stopPropagation()">
        <button class="ib" onclick="editCat(${c.id})">${EDIT_ICO}</button>
        <button class="ib r" onclick="delCat(${c.id})">${DEL_ICO}</button>
      </div>
      <div class="cat-name">${esc(c.name)}</div>
      <div class="cat-meta">
        <span>👤 ${mCnt}</span>
        <span>📋 ${sCnt} послуг</span>
        ${c.icon ? '<span class="cat-has-icon">🖼 іконка</span>' : '<span class="cat-no-icon" style="opacity:.4">без іконки</span>'}
      </div>
    </div>`;
            })
            .join("") +
          `
  <button class="cat-add" onclick="addCat()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    Нова категорія
  </button>`;
      }

      function addCat() {
        modal(
          "Нова категорія",
          `
    <div class="fg"><label>Назва *</label><input id="f-name" placeholder="Перукар / Колорист"></div>
    <div class="fg"><label>Slug *</label><input id="f-slug" placeholder="hair"><small>Латинські літери без пробілів</small></div>
    <div class="fg"><label>Позиція</label><input id="f-pos" type="number" value="0" min="0"></div>
  `,
          async () => {
            const row = {
              name: fv("f-name"),
              slug: fv("f-slug"),
              position: fn("f-pos"),
            };
            if (!row.name || !row.slug)
              throw new Error("Введіть назву та slug");
            await DB.ins("categories", row);
            toast("Категорію створено ✓");
            await loadHome();
          },
        );
        setTimeout(() => {
          const ni = document.getElementById("f-name"),
            si = document.getElementById("f-slug");
          ni?.addEventListener("input", () => {
            si.value = ni.value
              .toLowerCase()
              .replace(/\s+/g, "-")
              .replace(/[^\w-]/g, "");
          });
        }, 110);
      }

      // Рендерить превью іконки категорії
      function renderCatIconPreview(cat) {
        if (!cat.icon)
          return DEFAULT_SVG_ICONS[cat.slug] || DEFAULT_SVG_ICONS.massage || "";
        const t = (cat.icon || "").trim();
        if (t.startsWith("<")) return t;
        const url = t.startsWith("http")
          ? t
          : `${SUPABASE_URL}/storage/v1/object/public/icons/${t}`;
        return `<img src="${url}" style="width:22px;height:22px;object-fit:contain" onerror="this.style.opacity='.3'">`;
      }

      function editCat(id) {
        const c = S.cats.find((x) => x.id === id);
        if (!c) return;
        modal(
          "Редагувати категорію",
          `
    <div class="fg"><label>Назва *</label><input id="f-name" value="${esc(c.name)}"></div>
    <div class="fg"><label>Опис</label><input id="f-desc" value="${esc(c.description || "")}" placeholder="Короткий опис для картки на сайті"></div>
    <div class="fg"><label>Slug *</label><input id="f-slug" value="${esc(c.slug)}"></div>
    <div class="fg"><label>Позиція</label><input id="f-pos" type="number" value="${c.position || 0}" min="0"></div>
    <div class="fg">
      <label>Іконка на сайті (над назвою картки)</label>
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:.75rem;padding:.6rem .9rem;background:var(--bg4);border:1px solid var(--gbd);border-radius:8px">
        <div id="icon-preview" style="width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:var(--gold);flex-shrink:0">
          ${renderCatIconPreview(c)}
        </div>
        <div>
          <div style="font-size:.78rem;color:var(--t2);margin-bottom:.1rem">Прев'ю іконки</div>
          <div style="font-size:.7rem;color:var(--t3)">${c.icon ? "Іконка встановлена" : "Використовується іконка за замовчуванням"}</div>
        </div>
      </div>
      <div style="font-size:.75rem;color:var(--t3);margin-bottom:.35rem">Завантажити файл (SVG, PNG, WebP):</div>
      <input type="file" id="f-icon-file" accept="image/svg+xml,image/png,image/webp,image/jpeg"
        style="font-size:.8rem;color:var(--t2);width:100%" onchange="previewIconFile(this)">
      <div style="margin-top:.65rem;font-size:.75rem;color:var(--t3);margin-bottom:.3rem">або вставте SVG-код вручну:</div>
      <textarea id="f-icon-text" rows="3" placeholder="<svg viewBox=&quot;0 0 24 24&quot; ...>...</svg>"
        style="width:100%;background:var(--bg4);border:1px solid var(--gbd);border-radius:6px;padding:.5rem;color:var(--text);font-size:.78rem;resize:vertical">${esc(c.icon || "")}</textarea>
      ${c.icon ? `<button type="button" onclick="document.getElementById('f-icon-text').value='';document.getElementById('icon-preview').innerHTML='<span style=\'opacity:.3;font-size:.7rem\'>видалено</span>'" style="margin-top:.4rem;font-size:.72rem;color:var(--red);background:none;border:none;cursor:pointer;padding:0">✕ Видалити іконку</button>` : ""}
    </div>
  `,
          async () => {
            let iconVal = fv("f-icon-text") || null;
            // Якщо вибрано файл — завантажуємо в Storage
            const fileInput = document.getElementById("f-icon-file");
            if (fileInput && fileInput.files[0]) {
              iconVal = await uploadIconFile(
                fileInput.files[0],
                fv("f-slug") || c.slug,
              );
            }
            const row = {
              name: fv("f-name"),
              description: fv("f-desc") || null,
              slug: fv("f-slug"),
              position: fn("f-pos"),
              icon: iconVal,
            };
            if (!row.name || !row.slug)
              throw new Error("Введіть назву та slug");
            await DB.upd("categories", id, row);
            toast("Збережено ✓");
            await loadHome();
          },
        );
      }

      async function delCat(id) {
        if (
          !confirm(
            "Видалити категорію? Всі майстри, послуги і ціни будуть видалені!",
          )
        )
          return;
        await DB.del("categories", id);
        toast("Видалено");
        await loadHome();
      }

      // ══════════════════════════════════════════════════════════════
      // CATEGORY DETAIL
      // ══════════════════════════════════════════════════════════════
      async function openCat(catId) {
        activeCatId = catId;
        setNav("nav-cats");
        setPage("pg-cat");

        // Show loading
        document.getElementById("price-table-wrap").innerHTML =
          '<div class="loading"><div class="sp"></div></div>';
        document.getElementById("cat-masters-list").innerHTML =
          '<div class="loading"><div class="sp"></div></div>';

        try {
          [S.cats, S.masters, S.svcs, S.prices] = await Promise.all([
            DB.all("categories"),
            DB.all("masters"),
            DB.all("services"),
            DB.all("prices"),
          ]);
        } catch (err) {
          toast("Помилка завантаження: " + err.message, "er");
          document.getElementById("price-table-wrap").innerHTML =
            '<div class="svc-empty" style="color:var(--red)">Помилка: ' +
            err.message +
            "</div>";
          document.getElementById("cat-masters-list").innerHTML = "";
          return;
        }

        const cat = S.cats.find((c) => c.id === catId);
        document.getElementById("bc-name").textContent = cat?.name || "";
        document.getElementById("cat-title").textContent = cat?.name || "";

        document.getElementById("btn-add-hdr").onclick = () =>
          addSvc(catId, true);
        document.getElementById("btn-add-svc").onclick = () =>
          addSvc(catId, false);
        document.getElementById("btn-add-master").onclick = () =>
          openMasterForm({}, catId);

        renderPriceTable(catId);
        renderCatMasters(catId);
      }

      // ── Price / Services table ───────────────────────────────────
      function renderPriceTable(catId) {
        const wrap = document.getElementById("price-table-wrap");
        const catMasters = S.masters.filter((m) => m.category_id === catId);
        const catSvcs = S.svcs.filter((s) => s.category_id === catId);

        if (!catSvcs.length) {
          wrap.innerHTML = `<div class="svc-empty">Немає послуг.<br>Натисніть «+ Заголовок» або «+ Послуга»</div>`;
          return;
        }

        // If no masters yet — show simple list
        if (!catMasters.length) {
          wrap.innerHTML = `
      <div class="svc-empty" style="color:var(--t3)">Спочатку додайте майстрів →</div>
      ${catSvcs
        .map(
          (s) => `
        <div class="svc-row ${s.is_header ? "is-hdr" : ""}">
          <span class="svc-lbl">${esc(s.name)}</span>
          <div class="row-acts">
            <button class="ib" onclick="editSvc(${s.id})">${EDIT_ICO}</button>
            <button class="ib r" onclick="delSvc(${s.id})">${DEL_ICO}</button>
          </div>
        </div>`,
        )
        .join("")}`;
          return;
        }

        let html = `<div class="ptbl-wrap"><table class="ptbl"><thead><tr><th>Послуга</th>`;
        catMasters.forEach((m) => {
          html += `<th><div class="mhead">
      ${
        m.avatar
          ? `<img src="${esc(resolveAvatarUrl(m.avatar))}" class="mhead-img" onerror="this.style.display='none'">`
          : `<div class="mhead-ph">${esc(m.name[0])}</div>`
      }
      <span class="mhead-nm">${esc(m.name)}</span>
      
    </div></th>`;
        });
        html += `<th style="width:60px"></th></tr></thead><tbody>`;

        catSvcs.forEach((svc) => {
          if (svc.is_header) {
            const cols = catMasters.length + 2;
            html += `<tr class="hdr-row"><td colspan="${cols}">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span>${esc(svc.name)}</span>
          <div style="display:flex;gap:.25rem">
            <button class="ib" onclick="editSvc(${svc.id})">${EDIT_ICO}</button>
            <button class="ib r" onclick="delSvc(${svc.id})">${DEL_ICO}</button>
          </div>
        </div>
      </td></tr>`;
          } else {
            html += `<tr><td>${esc(svc.name)}</td>`;
            catMasters.forEach((m) => {
              const p = S.prices.find(
                (pr) => pr.service_id === svc.id && pr.master_id === m.id,
              );
              const val =
                p?.label ||
                (p?.price_to
                  ? `${p.price_from}–${p.price_to} ₴`
                  : p?.price_from
                    ? `${p.price_from} ₴`
                    : null);
              html += `<td>
          <span class="${val ? "pval" : "padd"}"
            onclick="editPrice(${svc.id},${m.id},'${esc(val || "")}','${esc(svc.name)}','${esc(m.name)}')">
            ${val ? esc(val) : "+ ціна"}
          </span>
        </td>`;
            });
            html += `<td><div style="display:flex;gap:.25rem;justify-content:flex-end">
        <button class="ib" onclick="editSvc(${svc.id})">${EDIT_ICO}</button>
        <button class="ib r" onclick="delSvc(${svc.id})">${DEL_ICO}</button>
      </div></td></tr>`;
          }
        });

        html += `</tbody></table></div>`;
        wrap.innerHTML = html;
      }

      // ── Edit price cell ──────────────────────────────────────────
      function editPrice(svcId, masterId, cur, svcName, masterName) {
        modal(
          `Ціна: ${svcName}`,
          `
    <p style="font-size:.8rem;color:var(--t2);margin-bottom:1rem">
      Майстер: <strong style="color:var(--gold2)">${esc(masterName)}</strong>
    </p>
    <div class="fg">
      <label>Ціна</label>
      <input id="f-price" value="${esc(cur)}" placeholder="500 ₴   або   500-600 ₴   або   від 4800 ₴">
      <small>Залиште порожнім щоб видалити ціну</small>
    </div>
  `,
          async () => {
            const val = fv("f-price");
            if (val) await DB.upsertPrice(svcId, masterId, val);
            else await DB.delPrice(svcId, masterId);
            toast(val ? "Ціну збережено ✓" : "Ціну видалено");
            S.prices = await DB.all("prices");
            renderPriceTable(activeCatId);
          },
        );
        setTimeout(() => {
          const inp = document.getElementById("f-price");
          inp?.focus();
          inp?.select();
        }, 120);
      }

      // ── Service CRUD ─────────────────────────────────────────────
      function addSvc(catId, isHeader = false) {
        modal(
          isHeader ? "Новий заголовок" : "Нова послуга",
          `
    <div class="fg">
      <label>${isHeader ? "Назва заголовку *" : "Назва послуги *"}</label>
      <input id="f-name" placeholder="${isHeader ? "Наприклад: Стрижка" : "Наприклад: Густе волосся"}">
    </div>
    <div class="fg"><label>Позиція</label><input id="f-pos" type="number" value="99" min="0"></div>
  `,
          async () => {
            const row = {
              category_id: catId,
              name: fv("f-name"),
              is_header: isHeader,
              position: fn("f-pos"),
            };
            if (!row.name) throw new Error("Введіть назву");
            await DB.ins("services", row);
            toast("Додано ✓");
            S.svcs = await DB.all("services");
            renderPriceTable(catId);
          },
        );
      }

      function editSvc(id) {
        const s = S.svcs.find((x) => x.id === id);
        if (!s) return;
        modal(
          s.is_header ? "Редагувати заголовок" : "Редагувати послугу",
          `
    <div class="fg"><label>Назва *</label><input id="f-name" value="${esc(s.name)}"></div>
    <div class="fg"><label>Позиція</label><input id="f-pos" type="number" value="${s.position || 0}" min="0"></div>
  `,
          async () => {
            await DB.upd("services", id, {
              name: fv("f-name"),
              position: fn("f-pos"),
            });
            toast("Збережено ✓");
            S.svcs = await DB.all("services");
            renderPriceTable(activeCatId);
          },
        );
      }

      async function delSvc(id) {
        if (!confirm("Видалити послугу? Ціни теж будуть видалені.")) return;
        await DB.del("services", id);
        toast("Видалено");
        S.svcs = await DB.all("services");
        S.prices = await DB.all("prices");
        renderPriceTable(activeCatId);
      }

      // ── Category masters sidebar ─────────────────────────────────
      function renderCatMasters(catId) {
        const el = document.getElementById("cat-masters-list");
        const catMasters = S.masters.filter((m) => m.category_id === catId);

        if (!catMasters.length) {
          el.innerHTML = `<div class="svc-empty">Немає майстрів.<br>Натисніть «+ Майстер»</div>`;
          return;
        }
        el.innerHTML = catMasters
          .map(
            (m) => `
    <div class="master-row">
      ${avaEl(m.avatar, m.name)}
      <div class="master-info">
        <div class="master-name">
          ${esc(m.name)}
          
        </div>
        <div class="master-role">${esc(m.role || "")}</div>
      </div>
      <div style="display:flex;gap:.25rem">
        <button class="ib" onclick="editMasterLocal(${m.id})">${EDIT_ICO}</button>
        <button class="ib r" onclick="delMasterLocal(${m.id})">${DEL_ICO}</button>
      </div>
    </div>`,
          )
          .join("");
      }

      function editMasterLocal(id) {
        openMasterForm(S.masters.find((m) => m.id === id) || {}, activeCatId);
      }
      async function delMasterLocal(id) {
        if (
          !confirm("Видалити майстра? Ціни цього майстра теж будуть видалені.")
        )
          return;
        await DB.del("masters", id);
        toast("Видалено");
        S.masters = await DB.all("masters");
        S.prices = await DB.all("prices");
        renderCatMasters(activeCatId);
        renderPriceTable(activeCatId);
      }

      // ══════════════════════════════════════════════════════════════
      // MASTERS — спільна форма
      // ══════════════════════════════════════════════════════════════
      function switchMasterTab(tab) {
        const newPanel = document.getElementById("tab-new-panel");
        const existPanel = document.getElementById("tab-exist-panel");
        const tabNew = document.getElementById("tab-new");
        const tabExist = document.getElementById("tab-exist");
        if (!newPanel || !existPanel) return;
        if (tab === "new") {
          newPanel.style.display = "";
          existPanel.style.display = "none";
          if (tabNew) {
            tabNew.style.background = "var(--gold)";
            tabNew.style.color = "#000";
            tabNew.style.fontWeight = "600";
          }
          if (tabExist) {
            tabExist.style.background = "var(--bg4)";
            tabExist.style.color = "var(--t2)";
            tabExist.style.fontWeight = "400";
          }
        } else {
          newPanel.style.display = "none";
          existPanel.style.display = "";
          if (tabExist) {
            tabExist.style.background = "var(--gold)";
            tabExist.style.color = "#000";
            tabExist.style.fontWeight = "600";
          }
          if (tabNew) {
            tabNew.style.background = "var(--bg4)";
            tabNew.style.color = "var(--t2)";
            tabNew.style.fontWeight = "400";
          }
        }
      }

      function openMasterForm(m = {}, defaultCatId = null) {
        const isEdit = !!m.id;
        const catId = m.category_id || defaultCatId;
        const catOpts = S.cats
          .map(
            (c) =>
              `<option value="${c.id}" ${catId === c.id ? "selected" : ""}>${esc(c.name)}</option>`,
          )
          .join("");

        // Майстри з ІНШИХ категорій (для прив'язки)
        const otherMasters = S.masters.filter((mx) => mx.category_id !== catId);
        const otherMasterOpts = otherMasters.length
          ? otherMasters
              .map((mx) => {
                const mxCat = S.cats.find((cx) => cx.id === mx.category_id);
                return `<option value="${mx.id}">${esc(mx.name)} (${esc(mxCat?.name || "?")})</option>`;
              })
              .join("")
          : "";

        modal(
          isEdit ? "Редагувати майстра" : "Додати майстра",
          `
    ${
      !isEdit && otherMasters.length
        ? `
    <div style="display:flex;gap:0;margin-bottom:1rem;border:1px solid var(--gbd);border-radius:8px;overflow:hidden">
      <button type="button" id="tab-new" onclick="switchMasterTab('new')"
        style="flex:1;padding:.5rem;background:var(--gold);color:#000;font-size:.82rem;font-weight:600;border:none;cursor:pointer">
        + Новий майстер
      </button>
      <button type="button" id="tab-exist" onclick="switchMasterTab('exist')"
        style="flex:1;padding:.5rem;background:var(--bg4);color:var(--t2);font-size:.82rem;border:none;cursor:pointer">
        Прив'язати існуючого
      </button>
    </div>
    <div id="tab-exist-panel" style="display:none">
      <div class="fg"><label>Оберіть майстра *</label>
        <select id="f-exist-master" style="width:100%">
          <option value="">— оберіть —</option>${otherMasterOpts}
        </select>
      </div>
      <p style="font-size:.75rem;color:var(--t3);margin-top:.25rem">
        Майстер буде переміщений до цієї категорії (category_id зміниться).
      </p>
    </div>
    <div id="tab-new-panel">`
        : '<div id="tab-new-panel">'
    }
    <div class="fg"><label>Категорія *</label>
      <select id="f-cat"><option value="">— оберіть —</option>${catOpts}</select>
    </div>
    <div class="fg"><label>Ім'я *</label><input id="f-name" value="${esc(m.name || "")}"></div>
    <div class="fg"><label>Роль</label>
      <select id="f-role">
        <option value="Майстер1" ${m.role !== "Майстер2" && m.role !== "Топ-майстер" ? "selected" : ""}>Майстер1</option>
        <option value="Майстер2" ${m.role === "Майстер2" || m.role === "Топ-майстер" ? "selected" : ""}>Майстер2</option>
      </select>
    </div>
    <div class="fg"><label>Фото майстра</label>
      ${
        m.avatar
          ? `<div id="ava-preview-wrap" style="margin-bottom:.5rem">
        <img id="ava-preview" src="${m.avatar.startsWith("http") ? m.avatar : m.avatar.startsWith("images/") ? "/" + m.avatar : SUPABASE_URL + "/storage/v1/object/public/avatars/" + m.avatar}"
          style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:1px solid var(--gbd)"
          onerror="this.style.display='none'">
      </div>`
          : `<div id="ava-preview-wrap" style="display:none;margin-bottom:.5rem">
        <img id="ava-preview" style="width:56px;height:56px;border-radius:50%;object-fit:cover;border:1px solid var(--gbd)">
      </div>`
      }
      <input type="file" id="f-ava-file" accept="image/*" style="display:none" onchange="previewAvatar(this)">
      <input id="f-ava" type="hidden" value="${esc(m.avatar || "")}">
      <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
        <button type="button" class="btn btn-o btn-sm" onclick="document.getElementById('f-ava-file').click()">
          📁 Обрати фото
        </button>
        <span id="ava-filename" style="font-size:.75rem;color:var(--t3)">${m.avatar ? "Фото завантажено" : "Не обрано"}</span>
      </div>
      <small>Фото завантажується в Supabase Storage автоматично</small>
    </div>
    <div class="fg"><label>Позиція</label><input id="f-pos" type="number" value="${m.position || 0}" min="0"></div>
    </div>
  `,
          async () => {
            // Перевіряємо чи вибрана вкладка "існуючий майстер"
            const existPanel = document.getElementById("tab-exist-panel");
            if (existPanel && existPanel.style.display !== "none") {
              // Прив'язуємо існуючого майстра до поточної категорії
              const existId = fn("f-exist-master");
              if (!existId) throw new Error("Оберіть майстра зі списку");
              await DB.upd("masters", existId, { category_id: catId });
              toast("Майстра прив'язано до категорії ✓");
              S.masters = await DB.all("masters");
              S.prices = await DB.all("prices");
              if (activeCatId) {
                renderCatMasters(activeCatId);
                renderPriceTable(activeCatId);
              }
              return;
            }

            // Якщо обрано нове фото — завантажуємо в Storage
            const uploadedPath = await uploadPendingAvatar();
            const avatarVal = uploadedPath || fv("f-ava");

            const row = {
              category_id: fn("f-cat"),
              name: fv("f-name"),
              role: fv("f-role"),
              avatar: avatarVal,
              position: fn("f-pos"),
            };
            if (!row.category_id || !row.name)
              throw new Error("Заповніть категорію та ім'я");
            if (isEdit) await DB.upd("masters", m.id, row);
            else await DB.ins("masters", row);
            toast(isEdit ? "Збережено ✓" : "Майстра додано ✓");
            S.masters = await DB.all("masters");
            // Refresh wherever we are
            if (
              document.getElementById("pg-cat").classList.contains("active")
            ) {
              renderCatMasters(activeCatId);
              S.prices = await DB.all("prices");
              renderPriceTable(activeCatId);
            }
            if (
              document.getElementById("pg-masters").classList.contains("active")
            ) {
              renderAllMasters();
            }
          },
        );
      }

      // ── All masters page ─────────────────────────────────────────
      async function loadAllMasters() {
        const el = document.getElementById("all-masters-list");
        el.innerHTML = `<div class="loading"><div class="sp"></div></div>`;
        [S.cats, S.masters] = await Promise.all([
          DB.all("categories"),
          DB.all("masters"),
        ]);
        renderAllMasters();
      }

      function renderAllMasters() {
        const el = document.getElementById("all-masters-list");
        if (!S.masters.length) {
          el.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--t3)">Немає майстрів</div>`;
          return;
        }
        let html = "";
        S.cats.forEach((c) => {
          const cm = S.masters.filter((m) => m.category_id === c.id);
          if (!cm.length) return;
          html += `<div class="blk" style="margin-bottom:1rem">
      <div class="blk-hdr"><span class="blk-title">${esc(c.name)}</span></div>
      <div>
      ${cm
        .map(
          (m) => `
        <div class="master-row">
          ${avaEl(m.avatar, m.name)}
          <div class="master-info">
            <div class="master-name">${esc(m.name)}
              
            </div>
            <div class="master-role">${esc(m.role || "")}</div>
          </div>
          <div style="display:flex;gap:.3rem">
            <button class="ib" onclick="openMasterForm(S.masters.find(x=>x.id===${m.id})||{})">${EDIT_ICO}</button>
            <button class="ib r" onclick="delMasterGlobal(${m.id})">${DEL_ICO}</button>
          </div>
        </div>`,
        )
        .join("")}
      </div>
    </div>`;
        });
        el.innerHTML = html;
      }

      async function delMasterGlobal(id) {
        if (!confirm("Видалити майстра? Його ціни теж будуть видалені."))
          return;
        await DB.del("masters", id);
        toast("Видалено");
        S.masters = await DB.all("masters");
        renderAllMasters();
      }

      // ══════════════════════════════════════════════════════════════
      // SCHEDULE
      // ══════════════════════════════════════════════════════════════
      async function loadSched() {
        const el = document.getElementById("sched-list");
        S.sched = await DB.all("schedule");
        renderSched();
      }

      function renderSched() {
        const el = document.getElementById("sched-list");
        if (!S.sched.length) {
          el.innerHTML = `<div style="padding:2rem;text-align:center;color:var(--t3)">Немає записів</div>`;
          return;
        }
        el.innerHTML = S.sched
          .map(
            (s) => `
    <div class="sched-row">
      <span class="sched-day">${esc(s.day_label)}</span>
      <span class="sched-time">${(s.open_time || "").slice(0, 5)} – ${(s.close_time || "").slice(0, 5)}</span>
      <div style="display:flex;gap:.3rem">
        <button class="ib" onclick="editSched(${s.id})">${EDIT_ICO}</button>
        <button class="ib r" onclick="delSched(${s.id})">${DEL_ICO}</button>
      </div>
    </div>`,
          )
          .join("");
      }

      function openSchedForm(s = {}) {
        const isEdit = !!s.id;
        modal(
          isEdit ? "Редагувати" : "Новий рядок",
          `
    <div class="fg"><label>Дні *</label>
      <input id="f-day" value="${esc(s.day_label || "")}" placeholder="Понеділок – П'ятниця">
    </div>
    <div class="fg2">
      <div class="fg"><label>Відкриття *</label><input id="f-o" type="time" value="${s.open_time || "08:00"}"></div>
      <div class="fg"><label>Закриття *</label><input id="f-c" type="time" value="${s.close_time || "20:00"}"></div>
    </div>
  `,
          async () => {
            const row = {
              day_label: fv("f-day"),
              open_time: fv("f-o"),
              close_time: fv("f-c"),
              position: s.position || 0,
            };
            if (!row.day_label) throw new Error("Введіть дні");
            if (isEdit) await DB.upd("schedule", s.id, row);
            else await DB.ins("schedule", row);
            toast(isEdit ? "Збережено ✓" : "Додано ✓");
            S.sched = await DB.all("schedule");
            renderSched();
          },
        );
      }

      function editSched(id) {
        openSchedForm(S.sched.find((x) => x.id === id) || {});
      }
      async function delSched(id) {
        if (!confirm("Видалити?")) return;
        await DB.del("schedule", id);
        toast("Видалено");
        S.sched = await DB.all("schedule");
        renderSched();
      }

      // ══════════════════════════════════════════════════════════════
      // EXPORT
      // ══════════════════════════════════════════════════════════════
      async function exportJSON() {
        toast("Завантаження...");
        const [cats, masters, svcs, prices, sched] = await Promise.all([
          DB.all("categories"),
          DB.all("masters"),
          DB.all("services"),
          DB.all("prices"),
          DB.all("schedule"),
        ]);
        const json = JSON.stringify(
          {
            exported_at: new Date().toISOString(),
            categories: cats,
            masters,
            services: svcs,
            prices,
            schedule: sched,
          },
          null,
          2,
        );
        const a = document.createElement("a");
        a.href = URL.createObjectURL(
          new Blob([json], { type: "application/json" }),
        );
        a.download = `milan_${new Date().toISOString().slice(0, 10)}.json`;
        a.click();
        toast("JSON завантажено ✓");
      }

      // ── Init ─────────────────────────────────────────────────────
      loadHome();
    </script>
  </body>
</html>
