<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Вхід — Milan Studio Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Manrope:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="favicon.png" />
    <style>
      :root {
        --bg: #0c0b0a;
        --bg-card: #1a1816;
        --text: #e8e4e0;
        --text-muted: #9a948c;
        --gold: #c9a962;
        --gold-light: #e2c98a;
        --border: rgba(201, 169, 98, 0.14);
        --danger-bg: rgba(192, 57, 43, 0.15);
        --radius: 10px;
        --font-display: "Cormorant Garamond", Georgia, serif;
        --font-body: "Manrope", system-ui, sans-serif;
      }
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: var(--font-body);
        background:
          radial-gradient(
            ellipse 80% 60% at 50% 0%,
            rgba(201, 169, 98, 0.08),
            transparent 70%
          ),
          var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .wrap {
        width: 100%;
        max-width: 380px;
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 2.5rem 2rem;
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.5);
      }
      .logo {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      .logo-milan {
        font-family: var(--font-display);
        font-size: 2rem;
        color: var(--gold);
        letter-spacing: 0.05em;
        display: block;
      }
      .logo-studio {
        font-size: 0.65rem;
        letter-spacing: 0.3em;
        color: var(--text-muted);
        text-transform: uppercase;
      }
      h1 {
        font-size: 0.95rem;
        font-weight: 500;
        color: var(--text-muted);
        text-align: center;
        margin-bottom: 1.75rem;
      }
      .form-group {
        display: flex;
        flex-direction: column;
        gap: 0.35rem;
        margin-bottom: 1rem;
      }
      label {
        font-size: 0.8rem;
        color: var(--text-muted);
      }
      input {
        padding: 0.7rem 0.9rem;
        background: #141210;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        color: var(--text);
        font-family: var(--font-body);
        font-size: 0.9rem;
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
      }
      input:focus {
        outline: none;
        border-color: var(--gold);
        box-shadow: 0 0 0 3px rgba(201, 169, 98, 0.1);
      }
      .btn {
        width: 100%;
        padding: 0.75rem;
        background: linear-gradient(135deg, var(--gold), #a8862e);
        color: #1a1511;
        font-family: var(--font-body);
        font-size: 0.9rem;
        font-weight: 600;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        transition:
          filter 0.2s,
          transform 0.2s;
        margin-top: 0.5rem;
      }
      .btn:hover:not(:disabled) {
        filter: brightness(1.1);
        transform: translateY(-1px);
      }
      .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .alert {
        padding: 0.75rem 1rem;
        background: var(--danger-bg);
        color: #e07070;
        border: 1px solid rgba(192, 57, 43, 0.3);
        border-radius: var(--radius);
        font-size: 0.875rem;
        margin-bottom: 1rem;
        display: none;
      }
      .alert.show {
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="logo">
        <span class="logo-milan">Milan</span>
        <span class="logo-studio">STUDIO</span>
      </div>
      <h1>Адміністративна панель</h1>

      <div class="alert" id="error-msg"></div>

      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          placeholder="admin@milan-studio.com"
          autocomplete="email"
        />
      </div>
      <div class="form-group">
        <label for="password">Пароль</label>
        <input type="password" id="password" autocomplete="current-password" />
      </div>
      <button class="btn" id="login-btn" onclick="login()">Увійти</button>
    </div>

    <!-- Supabase JS SDK (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <script>
      const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

      // Якщо вже є сесія — одразу на панель
      sb.auth.getSession().then(({ data }) => {
        if (data.session) window.location.href = "index.html";
      });

      async function login() {
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("login-btn");
        const errEl = document.getElementById("error-msg");

        if (!email || !password) {
          showError("Заповніть усі поля");
          return;
        }

        btn.disabled = true;
        btn.textContent = "Вхід...";
        errEl.classList.remove("show");

        const { error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          showError("Невірний email або пароль");
          btn.disabled = false;
          btn.textContent = "Увійти";
        } else {
          window.location.href = "index.html";
        }
      }

      function showError(msg) {
        const el = document.getElementById("error-msg");
        el.textContent = msg;
        el.classList.add("show");
      }

      // Enter для входу
      document.addEventListener("keydown", (e) => {
        if (e.key === "Enter") login();
      });
    </script>
  </body>
</html>
